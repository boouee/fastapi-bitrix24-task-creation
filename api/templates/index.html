<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактируемый список</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .item input[type="number"] { width: 60px; padding: 5px; }
        .item input[type="text"] { flex-grow: 1; padding: 5px; }
        button.delete-btn { background-color: #ff4d4f; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        button.delete-btn:hover { background-color: #ff7875; }
        #add-btn { margin-top: 10px; padding: 8px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Мой список</h2>
    <div id="list-container">
        <!-- Элементы списка будут добавляться сюда -->
    </div>
    
    <button id="add-btn" onclick="addItem()">+ Добавить элемент</button>

    <script>
        const container = document.getElementById('list-container');

        // Функция добавления нового элемента
        function addItem() {
            const div = document.createElement('div');
            div.className = 'item';
            
            div.innerHTML = `
                <input type="number" value="1" min="1" placeholder="Кол-во">
                <input type="text" placeholder="Название предмета">
                <button class="delete-btn" onclick="removeItem(this)">Удалить</button>
            `;
            
            container.appendChild(div);
        }

        // Функция удаления элемента
        function removeItem(button) {
            const itemDiv = button.parentElement;
            itemDiv.remove();
        }

        // Добавим один элемент для примера при загрузке страницы
        addItem();
    </script>
</body>
  </html>
